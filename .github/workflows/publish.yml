name: Publish Package to npmjs
on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install latest npm
        run: npm install -g npm
      - name: Install
        run: yarn install
      - name: Test
        run: yarn test
      - name: Publish
        run: npm publish --provenance --access public
